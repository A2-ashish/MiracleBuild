services:
  - type: web
    name: miracle-build-backend
    env: python
    region: oregon
    buildCommand: "pip install uv && uv venv && uv pip install --python .venv -r requirements.txt"
    startCommand: "uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: LOG_LEVEL
        value: INFO
      - key: DEFAULT_MODEL
        value: gemini-2.5-pro
      # GEMINI_API_KEY and GEMINI_API_KEYS should be set in the Render dashboard
